<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="NutriPlan">
<meta name="theme-color" content="#C9AB6E">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<title>NutriPlan</title>
<style>
:root {
  --bg:        #111113;
  --card:      #1F1F22;
  --elevated:  #2A2A2E;
  --gold:      #C9AB6E;
  --bronze:    #8B7255;
  --green:     #6A9E72;
  --red:       #BF4D40;
  --text:      #F2EDE4;
  --muted:     #999080;
  --divider:   #333336;
  --radius:    14px;
  --tab-h:     calc(60px + env(safe-area-inset-bottom));
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; overscroll-behavior: none; }
body { overflow: hidden; }

/* ── Layout ── */
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; padding-top: max(env(safe-area-inset-top), 50px); }
#content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: var(--tab-h); }
.view { display: none; padding: 16px; animation: fadeIn .18s ease; }
.view.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ── Tab Bar ── */
#tabbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--tab-h);
  background: #18181B;
  border-top: 1px solid var(--divider);
  display: flex;
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 100;
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; background: none; border: none; color: var(--muted); font-size: 10px;
  cursor: pointer; padding: 6px 0; transition: color .15s;
}
.tab-btn.active { color: var(--gold); }
.tab-btn svg { width: 22px; height: 22px; stroke-width: 1.8; }

/* ── Cards ── */
.card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
.card-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 14px; }
.elevated { background: var(--elevated); border-radius: 10px; }

/* ── Buttons ── */
.btn-gold {
  width: 100%; padding: 14px; background: var(--gold); color: #111;
  border: none; border-radius: 14px; font-size: 16px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-gold:disabled { opacity: .45; }
.btn-ghost { background: none; border: none; color: var(--gold); font-size: 14px; cursor: pointer; }
.btn-danger { background: none; border: none; color: var(--red); font-size: 14px; cursor: pointer; }

/* ── Form Controls ── */
input, textarea, select {
  width: 100%; background: var(--elevated); border: none; border-radius: 10px;
  color: var(--text); font-size: 15px; padding: 11px 13px; font-family: inherit;
  outline: none; -webkit-appearance: none;
}
textarea { resize: vertical; min-height: 90px; }
select option { background: var(--elevated); }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
.field-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; }
.field-row + .field-row { border-top: 1px solid var(--divider); }

/* ── Slider ── */
input[type=range] {
  padding: 0; background: none; height: 28px;
  -webkit-appearance: none; appearance: none;
}
input[type=range]::-webkit-slider-runnable-track {
  height: 4px; background: var(--divider); border-radius: 2px;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 22px; height: 22px;
  background: var(--gold); border-radius: 50%; margin-top: -9px;
  box-shadow: 0 1px 4px rgba(0,0,0,.4);
}

/* ── Segmented ── */
.seg { display: flex; background: var(--elevated); border-radius: 10px; padding: 3px; gap: 2px; }
.seg-btn {
  flex: 1; padding: 7px; border: none; border-radius: 8px; background: none;
  color: var(--muted); font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s;
}
.seg-btn.active { background: var(--gold); color: #111; font-weight: 600; }

/* ── Tags ── */
.tags { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
.tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px; font-size: 13px;
  border: 1px solid; cursor: default;
}
.tag.bronze { color: var(--text); border-color: rgba(139,114,85,.4); background: rgba(139,114,85,.12); }
.tag.red    { color: var(--text); border-color: rgba(191,77,64,.4);  background: rgba(191,77,64,.12); }
.tag-x { background: none; border: none; color: inherit; font-size: 12px; cursor: pointer; padding: 0; }
.tag-input-row { display: flex; gap: 8px; }
.tag-input-row input { flex: 1; }
.tag-add { background: none; border: none; color: var(--gold); font-size: 22px; cursor: pointer; padding: 0 4px; }

/* ── Progress Bar ── */
.progress-track { background: var(--divider); border-radius: 4px; height: 6px; overflow: hidden; }
.progress-fill  { height: 100%; border-radius: 4px; background: var(--gold); transition: width .4s ease; }
.progress-fill.green { background: var(--green); }

/* ── Day Card ── */
.day-card { background: var(--card); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; cursor: pointer; }
.day-card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 14px 10px; }
.day-num { font-size: 16px; font-weight: 700; }
.day-kcal { font-size: 14px; font-weight: 600; }
.day-kcal.green { color: var(--green); }
.day-kcal.gold  { color: var(--gold); }
.day-kcal.red   { color: var(--red); }
.cal-bar { margin: 0 14px 10px; }
.meal-row { display: flex; align-items: center; gap: 10px; padding: 9px 14px; }
.meal-row + .meal-row { border-top: 1px solid var(--divider); }
.meal-icon { font-size: 16px; width: 20px; text-align: center; }
.meal-info { flex: 1; min-width: 0; }
.meal-type { font-size: 11px; color: var(--muted); }
.meal-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.meal-kcal { font-size: 12px; color: var(--muted); white-space: nowrap; }
.day-hint { text-align: right; padding: 6px 14px 10px; font-size: 11px; color: var(--muted); }

/* ── Recipe Card ── */
.recipe-card { display: flex; align-items: center; gap: 12px; padding: 13px; background: var(--card); border-radius: 12px; margin-bottom: 10px; cursor: pointer; }
.recipe-icon { width: 46px; height: 46px; border-radius: 23px; background: rgba(201,171,110,.14); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.recipe-name { font-size: 15px; font-weight: 500; }
.recipe-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* ── Shopping Row ── */
.shop-row { display: flex; align-items: center; gap: 12px; padding: 11px 14px; cursor: pointer; }
.shop-row + .shop-row { border-top: 1px solid var(--divider); }
.check-circle {
  width: 25px; height: 25px; border-radius: 50%; border: 2px solid var(--divider);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all .2s;
}
.check-circle.done { border-color: var(--green); color: var(--green); }
.shop-name { flex: 1; font-size: 14px; transition: all .2s; }
.shop-name.done { color: var(--muted); text-decoration: line-through; }
.shop-days { font-size: 11px; color: var(--muted); }
.section-faded { opacity: .6; }

/* ── Stepper ── */
.stepper { display: flex; align-items: center; gap: 10px; }
.stepper-btn { background: none; border: none; color: var(--gold); font-size: 22px; cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
.stepper-val { font-size: 18px; font-weight: 700; color: var(--gold); min-width: 32px; text-align: center; }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200;
  display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg); width: 100%; border-radius: 20px 20px 0 0;
  max-height: calc(92vh - env(safe-area-inset-top) - env(safe-area-inset-bottom)); overflow-y: auto; display: flex; flex-direction: column;
  transform: translateY(40px); transition: transform .25s ease;
  padding-bottom: env(safe-area-inset-bottom);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--divider); border-radius: 2px; margin: 12px auto 0; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 10px; }
.modal-title { font-size: 17px; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--muted); font-size: 15px; cursor: pointer; }
.modal-body { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 16px 20px; flex: 1; }

/* ── Step Row ── */
.step-row { display: flex; gap: 12px; margin-bottom: 16px; cursor: pointer; }
.step-num { width: 28px; height: 28px; border-radius: 50%; background: var(--elevated); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--muted); flex-shrink: 0; transition: all .2s; }
.step-num.active { background: var(--gold); color: #111; }
.step-text { font-size: 14px; color: var(--muted); line-height: 1.55; transition: color .2s; padding-top: 4px; }
.step-text.active { color: var(--text); }

/* ── Misc ── */
.divider { height: 1px; background: var(--divider); margin: 10px 0; }
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 8px; font-size: 12px; }
.badge.gold { background: rgba(201,171,110,.15); color: var(--gold); }
.badge.green { background: rgba(106,158,114,.15); color: var(--green); }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 50px 30px; text-align: center; gap: 12px; }
.empty-icon { font-size: 52px; opacity: .5; }
.empty-title { font-size: 18px; font-weight: 600; }
.empty-text { font-size: 14px; color: var(--muted); line-height: 1.5; }
.cat-label { font-size: 12px; font-weight: 600; color: var(--muted); margin: 16px 0 8px; display: flex; align-items: center; gap: 6px; }
.info-box { background: rgba(106,158,114,.08); border-radius: 10px; padding: 11px 13px; display: flex; gap: 8px; align-items: flex-start; }
.info-box span { font-size: 13px; color: var(--muted); line-height: 1.5; font-style: italic; }
.spinner { width: 22px; height: 22px; border: 2px solid rgba(201,171,110,.3); border-top-color: var(--gold); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.model-radio { display: flex; align-items: center; gap: 10px; padding: 11px 0; cursor: pointer; }
.model-radio + .model-radio { border-top: 1px solid var(--divider); }
.radio-circle { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--divider); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.radio-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); display: none; }
.model-radio.selected .radio-circle { border-color: var(--gold); }
.model-radio.selected .radio-dot { display: block; }
.model-id { font-size: 11px; color: var(--muted); }
.token-row { display: flex; gap: 8px; align-items: center; }
.token-row input { flex: 1; font-family: monospace; font-size: 13px; }
.eye-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 0 4px; }

/* ── Custom Items (Einkauf) ── */
.custom-item-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; }
.custom-item-row + .custom-item-row { border-top: 1px solid var(--divider); }
.custom-item-name.done { color: var(--muted); text-decoration: line-through; }

/* ── Day Toggle Buttons (Fixes) ── */
.day-toggle-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.day-toggle-btn {
  padding: 5px 10px; border-radius: 8px; border: 1px solid var(--divider);
  background: none; color: var(--muted); font-size: 13px; cursor: pointer; transition: all .15s;
}
.day-toggle-btn.active { background: var(--gold); color: #111; border-color: var(--gold); font-weight: 600; }

/* ── Recipe Photo Upload ── */
.photo-upload-box {
  width: 100%; height: 110px; border: 2px dashed var(--divider); border-radius: 12px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; cursor: pointer; background: var(--elevated); transition: border-color .15s;
}
.photo-upload-box:hover { border-color: var(--gold); }
.photo-upload-box span { font-size: 13px; color: var(--muted); }
.photo-preview-wrap { position: relative; margin-bottom: 14px; }
.photo-preview-img { width: 100%; height: 160px; object-fit: cover; border-radius: 10px; display: block; }
.photo-remove-btn {
  position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,.65);
  border: none; border-radius: 50%; color: #fff; font-size: 15px; width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center; cursor: pointer; line-height: 1;
}
.recipe-card-photo { width: 100%; height: 140px; object-fit: cover; border-radius: 8px 8px 0 0; display: block; }

/* ── Fixed Meal Card ── */
.fixed-meal-card {
  background: var(--card); border-radius: var(--radius); padding: 14px; margin-bottom: 12px;
  position: relative;
}
.fixed-meal-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.fixed-meal-type { font-size: 12px; color: var(--gold); font-weight: 600; }
.fixed-meal-days { font-size: 11px; color: var(--muted); margin-left: auto; }
.fixed-meal-desc { font-size: 14px; color: var(--text); line-height: 1.5; margin-bottom: 8px; }
.fixed-meal-tip { font-size: 12px; color: var(--green); font-style: italic; margin-top: 6px; }
.fixed-meal-del { position: absolute; top: 12px; right: 12px; background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; line-height: 1; }
</style>
</head>
<body>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
<div id="app">
  <div id="content">
    <!-- PLAN TAB -->
    <div class="view active" id="view-plan">
      <div id="plan-content"></div>
    </div>
    <!-- REZEPTE TAB -->
    <div class="view" id="view-recipes">
      <div id="recipes-content"></div>
    </div>
    <!-- EINKAUF TAB -->
    <div class="view" id="view-shopping">
      <div id="shopping-content"></div>
    </div>
    <!-- FIXES TAB -->
    <div class="view" id="view-fixes">
      <div id="fixes-content"></div>
    </div>
    <!-- EINSTELLUNGEN TAB -->
    <div class="view" id="view-settings">
      <div id="settings-content"></div>
    </div>
  </div>

  <!-- TAB BAR -->
  <div id="tabbar">
    <button class="tab-btn active" onclick="switchTab('plan')" id="tab-plan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Plan
    </button>
    <button class="tab-btn" onclick="switchTab('recipes')" id="tab-recipes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Rezepte
    </button>
    <button class="tab-btn" onclick="switchTab('shopping')" id="tab-shopping">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      Einkauf
    </button>
    <button class="tab-btn" onclick="switchTab('fixes')" id="tab-fixes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      Fixes
    </button>
    <button class="tab-btn" onclick="switchTab('settings')" id="tab-settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Einstellungen
    </button>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-day" onclick="closeModal('modal-day')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="modal-day-title">Tag 1</span>
      <button class="modal-close" onclick="closeModal('modal-day')">Fertig</button>
    </div>
    <div class="modal-body" id="modal-day-body"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-cook" onclick="closeModal('modal-cook')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">Kochen</span>
      <button class="modal-close" onclick="closeModal('modal-cook')">Fertig</button>
    </div>
    <div class="modal-body" id="modal-cook-body"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-recipe-detail" onclick="closeModal('modal-recipe-detail')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">Rezept</span>
      <button class="modal-close" onclick="closeModal('modal-recipe-detail')">Fertig</button>
    </div>
    <div class="modal-body" id="modal-recipe-body"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-add-recipe" onclick="closeModal('modal-add-recipe')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">Rezept hinzufügen</span>
      <button class="modal-close" onclick="closeModal('modal-add-recipe')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Rezeptname *</label><input id="r-name" placeholder="z.B. Haferbrei mit Beeren"></div>
      <div class="field"><label>Kategorie</label>
        <select id="r-cat">
          <option value="breakfast">Frühstück</option>
          <option value="lunch">Mittagessen</option>
          <option value="dinner">Abendessen</option>
          <option value="snack">Snack</option>
          <option value="any">Flexibel</option>
        </select>
      </div>
      <div class="field-row"><span>Kalorien (gesamt)</span>
        <div class="stepper"><button class="stepper-btn" onclick="stepRecipe('calories',-50)">−</button><span class="stepper-val" id="r-cal-val">400</span><button class="stepper-btn" onclick="stepRecipe('calories',50)">+</button></div>
      </div>
      <div class="field-row"><span>Portionen</span>
        <div class="stepper"><button class="stepper-btn" onclick="stepRecipe('servings',-1)">−</button><span class="stepper-val" id="r-srv-val">1</span><button class="stepper-btn" onclick="stepRecipe('servings',1)">+</button></div>
      </div>
      <div class="field-row"><span>Zubereitungszeit (Min.)</span>
        <div class="stepper"><button class="stepper-btn" onclick="stepRecipe('prep',-5)">−</button><span class="stepper-val" id="r-prep-val">30</span><button class="stepper-btn" onclick="stepRecipe('prep',5)">+</button></div>
      </div>
      <div class="field" style="margin-top:14px"><label>Zutaten (eine pro Zeile) *</label><textarea id="r-ingredients" placeholder="80g Haferflocken&#10;250ml Hafermilch&#10;100g Heidelbeeren"></textarea></div>
      <div class="field"><label>Zubereitung</label><textarea id="r-instructions" placeholder="Schritt 1: ...&#10;Schritt 2: ..."></textarea></div>
      <div class="field"><label>Notizen (optional)</label><input id="r-notes" placeholder="Tipps, Variationen..."></div>
      <input type="file" id="recipe-photo-input" accept="image/*,image/heic,image/heif" style="display:none">
      <div class="field" id="recipe-photo-field">

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const MODELS = [
  { id: 'meta-llama/Llama-3.1-8B-Instruct',   name: 'Llama 3.1 8B (Empfohlen)' },
  { id: 'Qwen/Qwen2.5-7B-Instruct',           name: 'Qwen 2.5 7B' },
  { id: 'mistralai/Mistral-7B-Instruct-v0.3', name: 'Mistral 7B' },
  { id: 'microsoft/Phi-3.5-mini-instruct',     name: 'Phi-3.5 Mini (Schnell)' }
];

const MEAL_META = {
  breakfast: { label: 'Frühstück',   icon: '🌅' },
  lunch:     { label: 'Mittagessen', icon: '☀️' },
  dinner:    { label: 'Abendessen',  icon: '🌙' },
  snack:     { label: 'Snack',       icon: '🍃' },
  any:       { label: 'Flexibel',    icon: '🍴' }
};

// ÄNDERUNG 4: Kalorien-Standard auf 1350, Maximum bleibt bei 2000
let state = {
  settings: {
    calories: 1350, mealsPerDay: 3, selectedMeals: ['breakfast','lunch','dinner'], diet: 'Alles',
    hfModel: 'meta-llama/Llama-3.1-8B-Instruct',
    token: '', disliked: [], avoided: [],
    mainMeal: 'midday',
    restrictionBreakfast: '',
    restrictionLunch: '',
    restrictionDinner: '',
    restrictionSnack: ''
  },
  recipes: [],
  plan: null,
  shopping: [],
  numberOfDays: 7,
  // ÄNDERUNG 1: Mahlzeiten-Gedächtnis
  mealHistory: [],
  // ÄNDERUNG 2: Eigene Einkaufsartikel
  customItems: [],
  // ÄNDERUNG 5: Feste Mahlzeiten
  fixedMeals: [],
  // Plan-Verlauf
  planHistory: [],
  // Haushalt
  household: {
    persons: [
      {
        id: 'main',
        name: 'Ich',
        isMain: true,
        diet: 'Alles',
        disliked: [],
        avoided: [],
        restrictionBreakfast: '',
        restrictionLunch: '',
        restrictionDinner: '',
        restrictionSnack: ''
      }
    ],
    sharedMeals: { breakfast: false, lunch: true, dinner: true, snack: false }
  }
};

// Temp state for new recipe form
let _recipeForm = { calories: 400, servings: 1, prep: 30 };
// Temp state for cooking modal ingredient checks (not used in new cooking view but kept for compatibility)
let _cookChecked = {};
// Temp state for fixed meal day toggles
let _fixedDaysSelection = ['all'];

// HF Inference API – direkter Provider-Pfad im Router (CORS-sicher, für Vision-Modelle)
async function hfFetchVision(payload, signal) {
  const token = payload._token || state.settings.token.trim();
  const { _token, model, ...body } = payload;
  const url = `https://router.huggingface.co/hf-inference/models/${model}/v1/chat/completions`;
  return await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
    body: JSON.stringify({ model, ...body }),
    signal
  });
}

// Direkter Modell-Endpunkt (Fallback, kann CORS-Probleme haben)
async function hfFetchDirect(payload, signal) {
  const token = payload._token || state.settings.token.trim();
  const { _token, model, ...body } = payload;
  const url = `https://api-inference.huggingface.co/models/${model}/v1/chat/completions`;
  return await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
    body: JSON.stringify({ model, ...body }),
    signal
  });
}

async function hfFetch(payload, signal) {
  const token = payload._token || state.settings.token.trim();
  const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  if (isLocal) {
    const resp = await fetch('/api/hf', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal
    });
    return resp;
  } else {
    const { _token, ...body } = payload;
    const resp = await fetch('https://router.huggingface.co/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify(body),
      signal
    });
    return resp;
  }
}

function save() {
  try { localStorage.setItem('nutriplan', JSON.stringify(state)); } catch(e) {}
  // ÄNDERUNG 1: Mahlzeiten-Geschichte separat speichern
  try { localStorage.setItem('nutriplan_meal_history', JSON.stringify(state.mealHistory)); } catch(e) {}
  // ÄNDERUNG 2: Custom Items separat speichern
  try { localStorage.setItem('nutriplan_custom_items', JSON.stringify(state.customItems)); } catch(e) {}
  // ÄNDERUNG 5: Fixed Meals separat speichern
  try { localStorage.setItem('nutriplan_fixed_meals', JSON.stringify(state.fixedMeals)); } catch(e) {}
  // Household speichern
  try { localStorage.setItem('nutriplan_household', JSON.stringify(state.household)); } catch(e) {}
  // Plan-Verlauf speichern
  try { localStorage.setItem('nutriplan_plan_history', JSON.stringify(state.planHistory || [])); } catch(e) {}
}

function load() {
  try {
    const d = localStorage.getItem('nutriplan');
    if (d) state = { ...state, ...JSON.parse(d) };
  } catch(e) {}
  // ÄNDERUNG 1: Mahlzeiten-Geschichte laden
  try {
    const h = localStorage.getItem('nutriplan_meal_history');
    if (h) state.mealHistory = JSON.parse(h);
  } catch(e) { state.mealHistory = []; }
  // ÄNDERUNG 2: Custom Items laden
  try {
    const ci = localStorage.getItem('nutriplan_custom_items');
    if (ci) state.customItems = JSON.parse(ci);
  } catch(e) { state.customItems = []; }
  // ÄNDERUNG 5: Fixed Meals laden
  try {
    const fm = localStorage.getItem('nutriplan_fixed_meals');
    if (fm) state.fixedMeals = JSON.parse(fm);
  } catch(e) { state.fixedMeals = []; }
  // Household laden
  try {
    const hh = localStorage.getItem('nutriplan_household');
    if (hh) state.household = JSON.parse(hh);
  } catch(e) {}
  // Plan-Verlauf laden
  try {
    const ph = localStorage.getItem('nutriplan_plan_history');
    if (ph) state.planHistory = JSON.parse(ph);
  } catch(e) { state.planHistory = []; }
  if (!Array.isArray(state.planHistory)) state.planHistory = [];
  // Migration: mealsPerDay → selectedMeals
  if (!state.settings.selectedMeals) {
    const mp = state.settings.mealsPerDay || 3;
    state.settings.selectedMeals = mp === 2 ? ['breakfast','dinner']
      : mp === 4 ? ['breakfast','lunch','dinner','snack']
      : ['breakfast','lunch','dinner'];
  }
  // Fallback
  if (!state.household) state.household = {
    persons: [{id:'main',name:'Ich',isMain:true,diet:'Alles',disliked:[],avoided:[],restrictionBreakfast:'',restrictionLunch:'',restrictionDinner:'',restrictionSnack:''}],
    sharedMeals: {breakfast:false,lunch:true,dinner:true,snack:false}
  };
  // Sync Hauptperson mit settings
  if (state.household.persons && state.household.persons[0]) {
    state.household.persons[0].disliked = state.settings.disliked || [];
    state.household.persons[0].avoided = state.settings.avoided || [];
    state.household.persons[0].restrictionBreakfast = state.settings.restrictionBreakfast || '';
    state.household.persons[0].restrictionLunch = state.settings.restrictionLunch || '';
    state.household.persons[0].restrictionDinner = state.settings.restrictionDinner || '';
    state.household.persons[0].restrictionSnack = state.settings.restrictionSnack || '';
    state.household.persons[0].diet = state.settings.diet || 'Alles';
  }
}

// ═══════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════
let currentTab = 'plan';
function switchTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  currentTab = tab;
  renderTab(tab);
}
function renderTab(tab) {
  if (tab === 'plan')     renderPlan();
  if (tab === 'recipes')  renderRecipes();
  if (tab === 'shopping') renderShopping();
  if (tab === 'fixes')    renderFixes();
  if (tab === 'settings') renderSettings();
}

// ═══════════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════════
function openModal(id) {
  const el = document.getElementById(id);
  el.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

// ═══════════════════════════════════════════════
// PLAN VIEW
// ═══════════════════════════════════════════════
let isGenerating = false;

function renderPlan() {
  const c = document.getElementById('plan-content');
  const tokenOk = !!state.settings.token.trim();
  const modelName = MODELS.find(m => m.id === state.settings.hfModel)?.name || state.settings.hfModel;

  let html = `
  <div class="card" style="border: 1px solid rgba(201,171,110,.2)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div>
        <div style="font-size:16px;font-weight:600">Neuer Essensplan</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">⚙️ ${modelName}</div>
      </div>
      <div style="font-size:24px">✨</div>
    </div>
    <div class="divider"></div>
    <div class="field-row" style="margin:10px 0">
      <span style="font-size:15px">Anzahl Tage</span>
      <div class="stepper">
        <button class="stepper-btn" onclick="changeDays(-1)">−</button>
        <span class="stepper-val" id="days-val">${state.numberOfDays}</span>
        <button class="stepper-btn" onclick="changeDays(1)">+</button>
      </div>
    </div>
    ${(() => {
      const sm = state.settings.selectedMeals || ['breakfast','lunch','dinner'];
      const MCAL = {breakfast:300,lunch:400,dinner:400,snack:100};
      const MLBL = {breakfast:'Frühstück',lunch:'Mittagessen',dinner:'Abendessen',snack:'Snack'};
      const all = ['breakfast','lunch','dinner','snack'];
      const unpl = all.filter(m => !sm.includes(m));
      const unplCal = unpl.reduce((s,m) => s + MCAL[m], 0);
      if (unplCal === 0) return '';
      const tgt = Math.max(300, state.settings.calories - unplCal);
      return `<div style="background:rgba(201,171,110,.08);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--muted);line-height:1.6">
        💡 <strong style="color:var(--text)">${unpl.map(m=>MLBL[m]).join(' & ')}</strong> (~${unplCal} kcal) nicht geplant → KI plant <strong style="color:var(--gold)">${tgt} kcal</strong> auf ${sm.map(m=>MLBL[m]).join(' & ')} verteilt.
      </div>`;
    })()}
    <button class="btn-gold" id="gen-btn" onclick="generatePlan()" ${!tokenOk || isGenerating ? 'disabled' : ''}>
      ${isGenerating
        ? '<div class="spinner"></div><span>Wird erstellt…</span>'
        : '✨ Plan erstellen'}
    </button>
    ${!tokenOk ? '<p style="font-size:12px;color:var(--bronze);margin-top:10px;text-align:center">⚠️ Hugging Face Token in Einstellungen erforderlich</p>' : ''}
  </div>`;

  if (isGenerating) {
    html += `<div class="card" style="display:flex;gap:14px;align-items:center">
      <div class="spinner"></div>
      <div>
        <div style="font-size:14px;font-weight:500">KI erstellt deinen Plan…</div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px">Saisonalität, Nährstoffe & Abwechslung werden berücksichtigt</div>
      </div>
    </div>`;
  }

  if (state.plan) {
    const cookedCount = state.plan.days.filter(d => d.cooked).length;
    const planGenDate = state.plan.generatedAt
      ? new Date(state.plan.generatedAt).toLocaleString('de-DE',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})
      : '';
    html += `<div style="border:1px solid rgba(201,171,110,.3);border-radius:16px;overflow:hidden;margin-bottom:16px">
      <div style="background:rgba(201,171,110,.08);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(201,171,110,.2)">
        <div>
          <div style="font-size:16px;font-weight:700">📅 ${state.plan.days.length}-Tage-Plan</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">Erstellt ${planGenDate}${cookedCount > 0 ? ` · <span style="color:var(--green)">✓ ${cookedCount}/${state.plan.days.length} gekocht</span>` : ''}</div>
        </div>
        <button onclick="deletePlan()" style="background:none;border:1px solid var(--divider);color:var(--muted);border-radius:16px;padding:6px 12px;font-size:12px;cursor:pointer">🗑 Löschen</button>
      </div>
      ${state.plan.days.map((day, i) => renderDayCard(day, i < state.plan.days.length - 1)).join('')}
    </div>`;
  } else if (!isGenerating) {
    html += `<div class="empty-state">
      <div class="empty-icon">📅</div>
      <div class="empty-title">Noch kein Plan erstellt</div>
      <div class="empty-text">Wähle die Anzahl Tage und tippe auf „Plan erstellen".</div>
    </div>`;
  }

  // Plan-Verlauf Button
  if ((state.planHistory || []).length > 0) {
    html += `<div style="text-align:center;margin-top:4px">
      <button onclick="openPlanHistory()" style="background:none;border:1px solid var(--divider);color:var(--muted);border-radius:20px;padding:8px 16px;font-size:13px;cursor:pointer;margin-top:8px">
        📋 Frühere Pläne (${(state.planHistory || []).length})
      </button>
    </div>`;
  }

  c.innerHTML = html;
}

function formatDayDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('de-DE', { weekday:'short', day:'2-digit', month:'short' });
}

function renderDayCard(day, hasDivider = false) {
  const ratio = day.totalCalories / state.settings.calories;
  const cls = ratio > 1.12 ? 'red' : ratio < 0.88 ? 'gold' : 'green';
  const barPct = Math.min(ratio * 100, 100).toFixed(1);
  const barColor = cls === 'green' ? 'var(--green)' : cls === 'gold' ? 'var(--gold)' : 'var(--red)';
  const dateLabel = day.date ? formatDayDate(day.date) : `Tag ${day.dayNumber}`;

  let meals = day.meals.map(m => `
    <div class="meal-row" style="${m.cooked?'opacity:0.55':''}">
      <span class="meal-icon">${m.cooked ? '✅' : (MEAL_META[m.type]?.icon || '🍴')}</span>
      <div class="meal-info">
        <div class="meal-type">${MEAL_META[m.type]?.label || m.type}${m.linkedRecipeId ? ' 📖' : ''}</div>
        <div class="meal-name" style="${m.cooked?'text-decoration:line-through;color:var(--muted)':''}">${m.name}</div>
      </div>
      <span class="meal-kcal">${m.calories} kcal</span>
    </div>`).join('');

  return `<div style="padding:14px 16px;${day.cooked?'opacity:0.65;':''}${hasDivider?'border-bottom:1px solid rgba(201,171,110,.15);':''}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;cursor:pointer" onclick="openDayModal(${day.dayNumber})">
      <div>
        <span style="font-size:15px;font-weight:700">${dateLabel}</span>
        ${day.cooked ? '<span style="font-size:11px;color:var(--green);margin-left:8px;font-weight:600">✓ Gekocht</span>' : ''}
      </div>
      <span class="day-kcal ${cls}" style="font-size:13px">🔥 ${day.totalCalories} kcal</span>
    </div>
    <div style="margin-bottom:8px">
      <div class="progress-track"><div class="progress-fill" style="width:${barPct}%;background:${barColor}"></div></div>
    </div>
    ${meals}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:8px;border-top:1px solid var(--divider)">
      <button onclick="openDayModal(${day.dayNumber})" style="background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0">Details ›</button>
      <button onclick="event.stopPropagation();toggleDayCooked(${day.dayNumber})" style="background:${day.cooked?'var(--elevated)':'rgba(80,200,120,.15)'};border:1px solid ${day.cooked?'var(--divider)':'var(--green)'};color:${day.cooked?'var(--muted)':'var(--green)'};border-radius:16px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer">
        ${day.cooked ? '↩ Rückgängig' : '✓ Als gekocht markieren'}
      </button>
    </div>
  </div>`;
}

function toggleMealCooked(dayNum, mealId) {
  const day = state.plan?.days.find(d => d.dayNumber === dayNum);
  if (!day) return;
  const meal = day.meals.find(m => m.id === mealId);
  if (!meal) return;
  meal.cooked = !meal.cooked;
  // Automatisch Tag als gekocht markieren wenn alle Mahlzeiten fertig sind
  day.cooked = day.meals.every(m => m.cooked);
  save();
  closeModal('modal-cook');
  renderPlan();
}

function toggleDayCooked(dayNum) {
  const day = state.plan?.days.find(d => d.dayNumber === dayNum);
  if (!day) return;
  day.cooked = !day.cooked;
  save();
  renderPlan();
}

function deletePlan() {
  if (!confirm('Aktuellen Plan wirklich löschen?')) return;
  state.plan = null;
  state.shopping = [];
  save();
  renderPlan();
}

function changeDays(delta) {
  state.numberOfDays = Math.max(1, Math.min(14, state.numberOfDays + delta));
  save();
  const el = document.getElementById('days-val');
  if (el) el.textContent = state.numberOfDays;
}

// ═══════════════════════════════════════════════
// DAY DETAIL MODAL
// ═══════════════════════════════════════════════
function openDayModal(dayNum) {
  const day = state.plan?.days.find(d => d.dayNumber === dayNum);
  if (!day) return;

  const dayDateLabel = day.date ? formatDayDate(day.date) : `Tag ${dayNum}`;
  document.getElementById('modal-day-title').textContent = `${dayDateLabel} · ${day.totalCalories} kcal`;

  let html = `<div style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:6px">
      <span>${day.meals.length} Mahlzeiten</span><span>${day.totalCalories} kcal</span>
    </div>
    <div class="progress-track"><div class="progress-fill green" style="width:${Math.min(day.totalCalories/state.settings.calories*100,100).toFixed(1)}%"></div></div>
    <button onclick="toggleDayCooked(${dayNum});closeModal('modal-day')" style="margin-top:12px;width:100%;background:${day.cooked?'var(--elevated)':'rgba(80,200,120,.15)'};border:1px solid ${day.cooked?'var(--divider)':'var(--green)'};color:${day.cooked?'var(--muted)':'var(--green)'};border-radius:16px;padding:10px;font-size:14px;font-weight:600;cursor:pointer">
      ${day.cooked ? '↩ Als ungekocht markieren' : '✓ Tag als gekocht markieren'}
    </button>
  </div>`;

  for (const meal of day.meals) {
    const recipe = state.recipes.find(r => r.id === meal.linkedRecipeId);
    html += `<div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:12px;color:var(--gold);font-weight:600">${MEAL_META[meal.type]?.icon} ${MEAL_META[meal.type]?.label}</span>
        <span class="badge gold">${meal.calories} kcal</span>
      </div>
      <div style="font-size:17px;font-weight:700;margin-bottom:6px">${meal.name}</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:10px;line-height:1.5">${meal.description}</div>
      ${meal.ingredients.length ? `<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px">
        ${meal.ingredients.slice(0,6).map(i => `<span style="font-size:12px;padding:3px 8px;background:var(--elevated);border-radius:7px">${i}</span>`).join('')}
        ${meal.ingredients.length > 6 ? `<span style="font-size:12px;color:var(--muted)">+${meal.ingredients.length-6} mehr</span>` : ''}
      </div>` : ''}
      ${meal.nutritionHighlights ? `<div class="info-box" style="margin-bottom:10px"><span>🌿 ${meal.nutritionHighlights}</span></div>` : ''}
      ${recipe ? `<div style="font-size:12px;color:var(--gold);margin-bottom:10px">📖 Aus Rezeptsammlung</div>` : ''}
      <button class="btn-gold" onclick="openCookModal(${dayNum}, '${meal.id}')">🍳 Jetzt kochen</button>
    </div>`;
  }

  document.getElementById('modal-day-body').innerHTML = html;
  openModal('modal-day');
}

// ═══════════════════════════════════════════════
// COOKING MODAL (ÄNDERUNG 3: Zubereitung statt Checkboxen)
// ═══════════════════════════════════════════════
function openCookModal(dayNum, mealId) {
  const day = state.plan?.days.find(d => d.dayNumber === dayNum);
  const meal = day?.meals.find(m => m.id === mealId);
  if (!meal) return;

  const recipe = state.recipes.find(r => r.id === meal.linkedRecipeId);
  const ingredients = (recipe?.ingredients?.length ? recipe.ingredients : meal.ingredients) || [];

  const isShared = state.household?.sharedMeals?.[meal.type] === true;
  const defaultPortions = isShared ? (state.household?.persons?.length || 1) : 1;
  window._cookPortions = defaultPortions;
  window._cookIngredients = ingredients;

  // Zubereitungsschritte: zuerst meal.steps (KI-generiert), dann recipe.instructions als Fallback
  let steps = [];
  if (Array.isArray(meal.steps) && meal.steps.length) {
    steps = meal.steps;
  } else if (recipe?.instructions) {
    steps = recipe.instructions.split('\n').map(s => s.trim()).filter(Boolean);
  } else if (meal.instructions) {
    steps = Array.isArray(meal.instructions)
      ? meal.instructions
      : meal.instructions.split('\n').map(s => s.trim()).filter(Boolean);
  }

  let html = '';
  if (recipe?.photo) {
    html += `<img src="${recipe.photo}" alt="" style="width:100%;max-height:220px;object-fit:cover;border-radius:8px;display:block;margin-bottom:14px">`;
  }
  html += `
  <div class="card" style="margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:48px;height:48px;border-radius:24px;background:rgba(201,171,110,.14);display:flex;align-items:center;justify-content:center;font-size:22px">${MEAL_META[meal.type]?.icon}</div>
      <div>
        <div style="font-size:12px;color:var(--muted)">${MEAL_META[meal.type]?.label}</div>
        <div style="font-size:17px;font-weight:700">${meal.name}</div>
        <div style="font-size:12px;color:var(--gold);margin-top:2px">🔥 ${meal.calories} kcal${recipe ? ` · ⏱ ${recipe.prepTimeMinutes} Min.` : ''}</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--divider)">
      <span style="font-size:14px;color:var(--muted)">Portionen</span>
      <div class="stepper">
        <button class="stepper-btn" onclick="changeCookPortions(-1)">−</button>
        <span class="stepper-val" id="cook-portions-val">${defaultPortions}</span>
        <button class="stepper-btn" onclick="changeCookPortions(1)">+</button>
      </div>
    </div>
  </div>`;

  // Zutaten als einfache Liste mit Skalierung
  if (ingredients.length) {
    html += `<div class="card" style="margin-bottom:14px" id="cook-ingredients-card">
      <div class="card-title">Zutaten</div>
      <ul style="list-style:disc;padding-left:20px;margin:0" id="cook-ingredients-list">`;
    ingredients.forEach(ing => {
      const scaled = scaleIngredient(ing, window._cookPortions);
      html += `<li style="font-size:14px;padding:5px 0;border-bottom:1px solid var(--divider);list-style-position:outside">${scaled}</li>`;
    });
    html += `</ul>
    </div>`;
  }

  // ÄNDERUNG 3: Zubereitungsschritte als nummerierte Liste
  if (steps.length) {
    html += `<div class="card" style="margin-bottom:14px">
      <div class="card-title">Zubereitung</div>
      <ol style="list-style:none;padding:0;margin:0">`;
    steps.forEach((step, i) => {
      html += `<div class="step-row" onclick="toggleStep(${i})">
        <div class="step-num ${i===0?'active':''}" id="step-num-${i}">${i+1}</div>
        <div class="step-text ${i===0?'active':''}" id="step-txt-${i}">${step}</div>
      </div>`;
    });
    html += `</ol></div>`;
  } else {
    html += `<div class="card" style="margin-bottom:14px">
      <div class="card-title">Zubereitung</div>
      <p style="font-size:14px;color:var(--muted);line-height:1.6">${meal.description || 'Keine Zubereitungsanleitung verfügbar.'}</p>
    </div>`;
  }

  if (meal.nutritionHighlights) {
    html += `<div class="info-box" style="margin-bottom:14px"><span>🌿 ${meal.nutritionHighlights}</span></div>`;
  }

  html += `<button onclick="toggleMealCooked(${dayNum},'${meal.id}')" style="width:100%;background:${meal.cooked?'var(--elevated)':'rgba(80,200,120,.15)'};border:1px solid ${meal.cooked?'var(--divider)':'var(--green)'};color:${meal.cooked?'var(--muted)':'var(--green)'};border-radius:16px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px">
    ${meal.cooked ? '↩ Als ungekocht markieren' : '✓ Mahlzeit als gekocht markieren'}
  </button>`;

  document.getElementById('modal-cook-body').innerHTML = html;
  closeModal('modal-day');
  openModal('modal-cook');
}

function toggleStep(i) {
  document.querySelectorAll('.step-num').forEach((el, j) => {
    el.classList.toggle('active', j === i);
    document.getElementById('step-txt-' + j)?.classList.toggle('active', j === i);
  });
}

function scaleIngredient(ingredientStr, factor) {
  if (!factor || factor <= 1) return ingredientStr;
  return ingredientStr.replace(/^(\d+(?:[.,]\d+)?)\s*/, (_, n) => {
    const scaled = Math.round(parseFloat(n.replace(',', '.')) * factor);
    return scaled + ' ';
  });
}

function changeCookPortions(delta) {
  window._cookPortions = Math.max(1, Math.min(10, (window._cookPortions || 1) + delta));
  const valEl = document.getElementById('cook-portions-val');
  if (valEl) valEl.textContent = window._cookPortions;
  const listEl = document.getElementById('cook-ingredients-list');
  if (listEl && window._cookIngredients) {
    listEl.innerHTML = window._cookIngredients.map(ing => {
      const scaled = scaleIngredient(ing, window._cookPortions);
      return `<li style="font-size:14px;padding:5px 0;border-bottom:1px solid var(--divider);list-style-position:outside">${scaled}</li>`;
    }).join('');
  }
}
</script>

<script>
// ═══════════════════════════════════════════════
// RECIPES VIEW
// ═══════════════════════════════════════════════
function renderRecipes() {
  const c = document.getElementById('recipes-content');
  // Hidden file input for PDF import (rendered once)
  if (!document.getElementById('pdf-file-input')) {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.pdf'; inp.id = 'pdf-file-input';
    inp.style.display = 'none';
    inp.addEventListener('change', e => { if (e.target.files[0]) handlePDFImport(e.target.files[0]); inp.value = ''; });
    document.body.appendChild(inp);
  }

  if (!state.recipes.length) {
    c.innerHTML = `<div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:12px">
      <button style="padding:10px 14px;background:var(--elevated);border:none;border-radius:14px;color:var(--text);font-size:14px;font-weight:600;cursor:pointer" onclick="document.getElementById('pdf-file-input').click()">📄 PDF importieren</button>
      <button class="btn-gold" style="width:auto;padding:10px 20px" onclick="openAddRecipe()">+ Rezept</button>
    </div>
    <div class="empty-state">
      <div class="empty-icon">📖</div>
      <div class="empty-title">Noch keine Rezepte</div>
      <div class="empty-text">Füge deine Lieblingsrezepte hinzu, damit die KI sie in den Plan einbaut.</div>
    </div>`;
    return;
  }

  const groups = {};
  for (const r of state.recipes) {
    const cat = r.category || 'any';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(r);
  }

  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <div style="font-size:22px;font-weight:700">Meine Rezepte</div>
    <div style="display:flex;gap:8px">
      <button style="padding:10px 12px;background:var(--elevated);border:none;border-radius:14px;color:var(--text);font-size:13px;font-weight:600;cursor:pointer" onclick="document.getElementById('pdf-file-input').click()">📄 PDF</button>
      <button class="btn-gold" style="width:auto;padding:10px 18px" onclick="openAddRecipe()">+ Neu</button>
    </div>
  </div>`;

  for (const [cat, recipes] of Object.entries(groups)) {
    const m = MEAL_META[cat] || MEAL_META.any;
    html += `<div class="cat-label">${m.icon} ${m.label}</div>`;
    for (const r of recipes) {
      const photoTop = r.photo ? `<img class="recipe-card-photo" src="${r.photo}" alt="">` : '';
      html += `<div style="background:var(--card);border-radius:12px;margin-bottom:10px;cursor:pointer;overflow:hidden" onclick="openRecipeDetail('${r.id}')">
        ${photoTop}
        <div style="display:flex;align-items:center;gap:12px;padding:13px">
          ${r.photo ? '' : `<div class="recipe-icon">${m.icon}</div>`}
          <div style="flex:1;min-width:0">
            <div class="recipe-name">${r.name}</div>
            <div class="recipe-meta">🔥 ${Math.round(r.calories/(r.servings||1))} kcal · ⏱ ${r.prepTimeMinutes} Min.</div>
          </div>
          <svg style="flex-shrink:0" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>`;
    }
  }
  c.innerHTML = html;
}

function openAddRecipe(existingRecipeId) {
  _recipeForm = { calories: 400, servings: 1, prep: 30 };
  document.getElementById('r-name').value = '';
  document.getElementById('r-cat').value = 'any';
  document.getElementById('r-ingredients').value = '';
  document.getElementById('r-instructions').value = '';
  document.getElementById('r-notes').value = '';
  document.getElementById('r-cal-val').textContent = '400';
  document.getElementById('r-srv-val').textContent = '1';
  document.getElementById('r-prep-val').textContent = '30';
  window._recipePhotoData = null;
  window._editRecipeId = null;
  // Prefill if editing existing
  if (existingRecipeId) {
    const r = state.recipes.find(x => x.id === existingRecipeId);
    if (r) {
      window._editRecipeId = existingRecipeId;
      document.getElementById('r-name').value = r.name;
      document.getElementById('r-cat').value = r.category || 'any';
      document.getElementById('r-ingredients').value = (r.ingredients||[]).join('\n');
      document.getElementById('r-instructions').value = r.instructions || '';
      document.getElementById('r-notes').value = r.notes || '';
      _recipeForm.calories = r.calories;
      _recipeForm.servings = r.servings;
      _recipeForm.prep = r.prepTimeMinutes;
      document.getElementById('r-cal-val').textContent = r.calories;
      document.getElementById('r-srv-val').textContent = r.servings;
      document.getElementById('r-prep-val').textContent = r.prepTimeMinutes;
      window._recipePhotoData = r.photo || null;
    }
  }
  renderRecipePhotoPreview();
  // Wire up file input (once)
  const inp = document.getElementById('recipe-photo-input');
  inp.value = '';
  inp.onchange = function(e) {
    if (e.target.files[0]) {
      scanRecipePhoto(e.target.files[0]);
      inp.value = '';
    }
  };
  openModal('modal-add-recipe');
}

function renderRecipePhotoPreview() {
  const wrap = document.getElementById('recipe-photo-preview');
  if (!wrap) return;
  if (window._recipePhotoData) {
    wrap.innerHTML = `<div class="photo-preview-wrap">
      <img class="photo-preview-img" src="${window._recipePhotoData}" alt="Vorschau">
      <button class="photo-remove-btn" onclick="removeRecipePhoto()" title="Foto entfernen">✕</button>
    </div>`;
  } else {
    wrap.innerHTML = `<div class="photo-upload-box" onclick="document.getElementById('recipe-photo-input').click()" style="height:auto;padding:18px 16px;gap:8px">
      <span style="font-size:30px">📷</span>
      <span style="font-size:14px;font-weight:600;color:var(--text)">Rezeptfoto auswählen oder aufnehmen</span>
      <span style="font-size:12px;color:var(--muted);text-align:center">Aus Fotobibliothek, Kamera oder Dateien · KI erkennt Zutaten &amp; Zubereitung automatisch</span>
    </div>`;
  }
}

function removeRecipePhoto() {
  window._recipePhotoData = null;
  renderRecipePhotoPreview();
}

function parseVisionResponse(text) {
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('Kein JSON gefunden');
  return JSON.parse(match[0]);
}

function showScanStatus(msg, isError) {
  const el = document.getElementById('recipe-scan-status');
  if (!el) return;
  el.style.display = '';
  el.textContent = msg;
  if (isError) {
    el.style.color = 'var(--bronze)';
    el.style.background = 'rgba(200,80,80,.1)';
    el.style.border = '1px solid rgba(200,80,80,.3)';
  } else if (msg.startsWith('✅')) {
    el.style.color = 'var(--green)';
    el.style.background = 'rgba(80,200,120,.1)';
    el.style.border = '1px solid rgba(80,200,120,.3)';
  } else {
    el.style.color = 'var(--muted)';
    el.style.background = 'none';
    el.style.border = 'none';
  }
}

// Gemeinsame Funktion: befüllt alle Rezeptfelder aus geparsten Daten
function fillRecipeFields(parsed) {
  // Hilfsfunktion: Array oder String → mehrzeiliger String
  const toText = v => Array.isArray(v) ? v.join('\n') : (typeof v === 'string' ? v : '');
  if (parsed.name)        document.getElementById('r-name').value = parsed.name;
  const ing = toText(parsed.ingredients);
  if (ing)  document.getElementById('r-ingredients').value = ing;
  const steps = toText(parsed.steps);
  if (steps) document.getElementById('r-instructions').value = steps;
  if (parsed.calories && !isNaN(parsed.calories)) {
    const cal = Math.max(50, Math.min(3000, Math.round(+parsed.calories / 50) * 50));
    _recipeForm.calories = cal;
    document.getElementById('r-cal-val').textContent = cal;
  }
  if (parsed.duration && !isNaN(parsed.duration)) {
    const dur = Math.max(5, Math.min(300, Math.round(+parsed.duration / 5) * 5));
    _recipeForm.prep = dur;
    document.getElementById('r-prep-val').textContent = dur;
  }
  if (parsed.servings && !isNaN(parsed.servings)) {
    const srv = Math.max(1, Math.min(10, Math.round(+parsed.servings)));
    _recipeForm.servings = srv;
    document.getElementById('r-srv-val').textContent = srv;
  }
}

// Gemeinsame KI-Parse-Funktion für Text (PDF) und Bild (Foto)
async function parseWithAI(messagesPayload, fallbackFn, modelOverride) {
  const token = state.settings.token?.trim();
  if (!token) {
    showScanStatus('⚠️ Kein Token – bitte in Einstellungen eingeben', true);
    if (fallbackFn) fallbackFn();
    return;
  }
  const isVision = !!modelOverride;

  // Versuche ein Modell mit gegebenem fetch-Funktion
  const tryModel = async (model, fetchFn) => {
    showScanStatus(`🔍 KI erkennt Rezept… (${model.split('/').pop()})`);
    const resp = await fetchFn({
      _token: token,
      model,
      messages: messagesPayload,
      max_tokens: 2000,
      temperature: 0.2,
      stream: false
    });
    if (!resp.ok) {
      const errText = await resp.text().catch(() => '');
      throw new Error(`Status ${resp.status}: ${errText.slice(0,200)}`);
    }
    const data = await resp.json();
    const content = data.choices?.[0]?.message?.content || '';
    if (!content) throw new Error('Leere Antwort vom Modell');
    const parsed = parseVisionResponse(content);
    fillRecipeFields(parsed);
    showScanStatus('✅ Rezept erkannt – bitte prüfen');
  };

  if (!isVision) {
    // Normale Textgenerierung → Router
    try {
      await tryModel(modelOverride || state.settings.hfModel, hfFetch);
    } catch(e) {
      showScanStatus('❌ ' + e.message, true);
      if (fallbackFn) fallbackFn();
    }
    return;
  }

  // Vision-Scan: mehrere Strategien nacheinander
  const visionStrategies = [
    // 1. SmolVLM über HF Inference API Provider-Pfad (CORS-sicher)
    { model: 'HuggingFaceTB/SmolVLM-Instruct',           fn: hfFetchVision },
    // 2. Llama Vision über HF Inference API Provider-Pfad
    { model: 'meta-llama/Llama-3.2-11B-Vision-Instruct', fn: hfFetchVision },
    // 3. SmolVLM über direkten Endpunkt (letzter Versuch)
    { model: 'HuggingFaceTB/SmolVLM-Instruct',           fn: hfFetchDirect },
  ];

  for (const { model, fn } of visionStrategies) {
    try {
      await tryModel(model, fn);
      return; // Erfolg
    } catch(e) {
      console.warn(`Versuch fehlgeschlagen (${model}):`, e.message);
      if (e.message.includes('Load failed') || e.message.includes('NetworkError')) {
        // CORS/Netzwerk-Fehler – nächste Strategie
        showScanStatus('⚠️ Verbindungsproblem, versuche Alternative…');
      } else if (e.message.includes('provider')) {
        showScanStatus('⚠️ Provider nicht verfügbar, versuche Alternative…');
      }
    }
  }

  // Alle Strategien fehlgeschlagen
  showScanStatus('❌ Foto-Scan nicht verfügbar. Bitte Rezept manuell eingeben oder Provider unter huggingface.co/settings/inference-providers aktivieren.', true);
  if (fallbackFn) fallbackFn();
}

async function scanRecipePhoto(file) {
  renderRecipePhotoPreview();
  showScanStatus('📷 Bild wird vorbereitet…');

  let base64;
  try {
    // Klein halten (400px, 0.6) damit iOS Safari die Anfrage nicht abbricht
    base64 = await new Promise((resolve, reject) =>
      resizeImageToBase64(file, 400, 0.6, resolve, reject)
    );
  } catch(e) {
    showScanStatus('❌ Bild konnte nicht geladen werden: ' + (e || 'Unbekannter Fehler'), true);
    return;
  }

  window._recipePhotoData = base64;
  renderRecipePhotoPreview();

  const prompt = `Du bist ein Kochbuch-Scanner. Lies dieses Rezeptbild (gedruckt oder handgeschrieben) sorgfältig und extrahiere alle Informationen.

Antworte NUR mit diesem JSON-Objekt (kein Text davor oder danach):
{
  "name": "Rezeptname",
  "ingredients": ["200g Mehl", "3 Eier"],
  "steps": ["Schritt 1: ...", "Schritt 2: ..."],
  "calories": 450,
  "duration": 30,
  "servings": 2
}

Regeln:
- name: vollständiger Rezeptname wie im Bild
- ingredients: jede Zutat als eigener String mit Menge und Einheit
- steps: alle Zubereitungsschritte, vollständig und in richtiger Reihenfolge
- calories: geschätzte kcal pro Portion (wenn im Bild steht, direkt übernehmen)
- duration: Gesamtzeit in Minuten (Vorbereitung + Kochen)
- servings: Anzahl Portionen
- Antworte auf Deutsch
- Falls etwas nicht lesbar ist, schätze es sinnvoll`;

  await parseWithAI([{
    role: 'user',
    content: [
      { type: 'image_url', image_url: { url: base64 } },
      { type: 'text', text: prompt }
    ]
  }], null, 'meta-llama/Llama-3.2-11B-Vision-Instruct');
}

function resizeImageToBase64(file, maxSize, quality, callback, errCallback) {
  // Versuche zuerst createImageBitmap (unterstützt HEIC in Safari iOS)
  const tryBitmap = (src) => {
    fetch(src).then(r => r.blob()).then(blob => {
      createImageBitmap(blob).then(bmp => {
        const canvas = document.createElement('canvas');
        let w = bmp.width, h = bmp.height;
        if (w > maxSize || h > maxSize) {
          if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
          else { w = Math.round(w * maxSize / h); h = maxSize; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(bmp, 0, 0, w, h);
        callback(canvas.toDataURL('image/jpeg', quality));
      }).catch(() => { if (errCallback) errCallback('Bildformat nicht lesbar'); });
    }).catch(() => { if (errCallback) errCallback('Datei konnte nicht geladen werden'); });
  };

  const reader = new FileReader();
  reader.onload = e => {
    const src = e.target.result;
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => tryBitmap(src);
    img.src = src;
  };
  reader.onerror = () => { if (errCallback) errCallback('Datei konnte nicht gelesen werden'); };
  reader.readAsDataURL(file);
}

function stepRecipe(field, delta) {
  const limits = { calories: [50,3000,50], servings: [1,10,1], prep: [5,300,5] };
  const ids = { calories: 'r-cal-val', servings: 'r-srv-val', prep: 'r-prep-val' };
  const [min, max] = limits[field];
  _recipeForm[field] = Math.max(min, Math.min(max, _recipeForm[field] + delta));
  document.getElementById(ids[field]).textContent = _recipeForm[field];
}

async function importRecipePDF(file) {
  if (!window.pdfjsLib) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }

  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
  let text = '';
  for (let i = 1; i <= Math.min(pdf.numPages, 10); i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(item => item.str).join(' ') + '\n';
  }
  return text;
}

async function processPdfText(rawText) {
  const prompt = `Du bist ein Rezept-Parser. Analysiere diesen Rezepttext und extrahiere alle Informationen.

Antworte NUR mit diesem JSON (kein Text davor oder danach):
{
  "name": "Rezeptname",
  "ingredients": ["200g Mehl", "3 Eier"],
  "steps": ["Schritt 1: ...", "Schritt 2: ..."],
  "calories": 450,
  "duration": 30,
  "servings": 2
}

Regeln:
- ingredients: jede Zutat als eigener String mit Menge
- steps: klare Zubereitungsschritte
- calories: geschätzte kcal pro Portion
- duration: Gesamtzeit in Minuten
- servings: Anzahl Portionen
- Antworte auf Deutsch

Rezepttext:
${rawText}`;

  await parseWithAI([{ role: 'user', content: prompt }],
    // Fallback: Rohttext wenigstens in Zubereitung eintragen
    () => { document.getElementById('r-instructions').value = rawText.slice(0, 2000); }
  );
}

async function handlePDFImport(file) {
  try {
    const text = await importRecipePDF(file);
    const rawText = text.slice(0, 4000);
    const fileName = file.name.replace(/\.pdf$/i, '');
    // Open modal, set filename as fallback, then run AI parse
    openAddRecipe();
    setTimeout(async () => {
      document.getElementById('r-name').value = fileName;
      // Show scan status area (renderRecipePhotoPreview creates it)
      await processPdfText(rawText);
    }, 100);
  } catch(e) {
    alert('PDF-Import nicht verfügbar. Bitte Rezept manuell eingeben.');
  }
}

function addCustomItem() {

  if (!state.customItems) state.customItems = [];

function shopRow(item) {
  const dayLabel = item.days?.length === 1 ? `Tag ${item.days[0]}`
    : item.days?.length > 1 ? `Tag ${item.days[0]}–${item.days[item.days.length-1]}`
    : '';
  const sharedBadge = item.isShared && item.personCount > 1
    ? `<span style="font-size:11px;color:var(--muted);margin-left:6px">(${item.personCount} Pers.)</span>`
    : '';
  return `<div class="shop-row" onclick="toggleShopItem('${item.id}')">
    <div class="check-circle ${item.checked?'done':''}">${item.checked?'✓':''}</div>
    <div style="flex:1;min-width:0">
      <div class="shop-name ${item.checked?'done':''}" style="display:flex;align-items:center;flex-wrap:wrap">${item.name}${sharedBadge}</div>
      ${dayLabel ? `<div class="shop-days">📅 ${dayLabel}</div>` : ''}
    </div>

}

function customShopRow(item) {
  return `<div class="shop-row" onclick="toggleCustomItem('${item.id}')">
    <div class="check-circle ${item.checked?'done':''}">${item.checked?'✓':''}</div>
    <div style="flex:1;min-width:0">
      <div class="shop-name ${item.checked?'done':''}" style="display:flex;align-items:center;gap:6px">
        <span>📝</span><span>${item.name}</span>
      </div>
    </div>
    <button onclick="event.stopPropagation();deleteCustomItem('${item.id}')" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px">×</button>
  </div>`;
}

function toggleShopItem(id) {
  const item = state.shopping.find(i => i.id === id);
  if (item) { item.checked = !item.checked; save(); renderShopping(); }
}

function clearChecked() {
  state.shopping = state.shopping.filter(i => !i.checked);
  state.customItems = (state.customItems || []).filter(i => !i.checked);
  save(); renderShopping();
}

function openShoppingFilter() {
  const total = state.plan?.days.length || 0;
  let html = `<p style="font-size:14px;color:var(--muted);margin-bottom:16px">Für wie viele Tage soll der Einkaufszettel erstellt werden?</p>
  <div class="card" style="padding:0">`;
  html += `<div class="shop-row" onclick="generateShopping(0)" style="font-size:15px">Alle ${total} Tage</div>`;
  for (let d = 1; d <= total; d++) {
    html += `<div class="shop-row" style="border-top:1px solid var(--divider);font-size:15px" onclick="generateShopping(${d})">Nächste ${d} ${d===1?'Tag':'Tage'}</div>`;
  }
  html += `</div>`;
  document.getElementById('modal-shopping-filter-body').innerHTML = html;
  openModal('modal-shopping-filter');
}

function generateShopping(days) {
  const plan = state.plan;
  if (!plan) return;
  const relevantDays = days === 0 ? plan.days : plan.days.slice(0, days);
  const personCount = state.household?.persons?.length || 1;
  const map = {};
  for (const day of relevantDays) {
    for (const meal of day.meals) {
      const isShared = state.household?.sharedMeals?.[meal.type] === true;
      const factor = isShared ? personCount : 1;
      for (const ing of (meal.ingredients || [])) {
        const origKey = ing.trim();
        if (!origKey) continue;
        const scaled = scaleIngredient(origKey, factor);
        if (!map[origKey]) map[origKey] = { scaledName: scaled, days: [], isShared, factor };
        if (!map[origKey].days.includes(day.dayNumber)) map[origKey].days.push(day.dayNumber);
      }
    }
  }
  state.shopping = Object.entries(map).map(([, info]) => ({
    id: crypto.randomUUID(),
    name: info.scaledName,
    checked: false,
    days: info.days.sort((a,b)=>a-b),
    isShared: info.isShared,
    personCount: info.factor
  })).sort((a,b) => a.name.localeCompare(b.name, 'de'));
  save();
  closeModal('modal-shopping-filter');
  renderShopping();
}
</script>

  } else {
    desc = document.getElementById('fixed-desc').value.trim();
    if (!desc) { alert('Bitte Mahlzeit beschreiben.'); return; }
  }

  if (!state.fixedMeals) state.fixedMeals = [];
  state.fixedMeals.push({
    id: crypto.randomUUID(),
    description: desc,
    recipeId: recipeId || null,
    mealType: document.getElementById('fixed-type').value,
    days: [..._fixedDaysSelection],
    aiTip: ''
  });
  save();
  closeModal('modal-add-fixed');
  renderFixes();
}

function deleteFixedMeal(id) {
  state.fixedMeals = (state.fixedMeals || []).filter(fm => fm.id !== id);
  save();
  renderFixes();
}

async function fetchFixedMealTips() {
  const meals = state.fixedMeals || [];
  if (!meals.length) return;
  const token = state.settings.token.trim();
  if (!token) { alert('Bitte zuerst einen Hugging Face Token in den Einstellungen hinterlegen.'); return; }

  // Show loading state
  const btn = document.querySelector('#fixes-content .btn-gold:last-child');
  if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spinner" style="display:inline-block"></div> Wird geladen…'; }

  const mealsList = meals.map(fm => ({ id: fm.id, description: fm.description }));

  try {
    const resp = await hfFetch({
      _token: token,
      model: state.settings.hfModel,
      messages: [
        { role: 'system', content: 'Du bist Ernährungsberater. Gib für jede beschriebene Mahlzeit einen kurzen Optimierungstipp auf Deutsch (max. 1 Satz). Antworte nur mit validem JSON ohne Markdown.' },
        { role: 'user', content: `Gib für jede Mahlzeit einen kurzen Tipp. Antworte NUR mit JSON-Array: [{"id":"...","tip":"..."}]\n${JSON.stringify(mealsList)}` }
      ],
      max_tokens: 800,
      temperature: 0.5,
      stream: false
    });

    if (!resp.ok) throw new Error(`API-Fehler ${resp.status}`);
    const data = await resp.json();
    const content = data.choices?.[0]?.message?.content || '[]';
    const jsonStr = extractJSON(content);
    const tips = JSON.parse(jsonStr);

    if (Array.isArray(tips)) {
      for (const t of tips) {
        const fm = state.fixedMeals.find(m => m.id === t.id);
        if (fm && t.tip) fm.aiTip = t.tip;
      }
      save();
    }
  } catch(e) {
    alert('Fehler beim Laden der Tipps: ' + e.message);
  }

  renderFixes();
}
</script>
