// ═══════════════════════════════════════════════
// PLAN NORMALIZATION
// ═══════════════════════════════════════════════
const MEAL_TYPE_MAP = {
  'Fruehstueck':'breakfast','Frühstück':'breakfast',
  'Mittagessen':'lunch','Lunch':'lunch',
  'Abendessen':'dinner','Dinner':'dinner',
  'Snack':'snack'
};

function normalizePlan(plan) {
  const start = plan.generatedAt ? new Date(plan.generatedAt) : new Date();
  plan.days.forEach((day, i) => {
    day.dayNumber = i + 1;
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    day.date = d.toISOString().slice(0,10);
    day.cooked = day.cooked || false;
    day.meals = (day.meals || []).map(m => ({
      ...m,
      id: m.id || crypto.randomUUID(),
      type: MEAL_TYPE_MAP[m.type] || m.type,
      linkedRecipeId: m.linkedRecipeId || m.recipeId || null
    }));
    day.totalCalories = day.meals.reduce((s, m) => s + (parseInt(m.calories) || 0), 0);
  });
  return plan;
}

// ═══════════════════════════════════════════════
// HUGGING FACE API
// ═══════════════════════════════════════════════
function currentSeason() {
  const m = new Date().getMonth() + 1; // 1–12
  if (m >= 3 && m <= 5)  return 'Frühling';
  if (m >= 6 && m <= 8)  return 'Sommer';
  if (m >= 9 && m <= 11) return 'Herbst';
  return 'Winter';
}

async function generatePlan() {
  if (isGenerating) return;
  const token = state.settings.token.trim();
  if (!token) { alert('Bitte zuerst einen Hugging Face Token in den Einstellungen hinterlegen.'); return; }

  isGenerating = true;
  renderPlan();

  const season = currentSeason();
  const avoided  = state.settings.avoided?.length  ? state.settings.avoided.join(', ')  : 'keine';
  const disliked = state.settings.disliked?.length ? state.settings.disliked.join(', ') : 'keine';
  const selectedMeals = state.settings.selectedMeals?.length
    ? state.settings.selectedMeals
    : ['breakfast','lunch','dinner'];
  const mealLabelMap = { breakfast:'Frühstück', lunch:'Mittagessen', dinner:'Abendessen', snack:'Snack' };
  const mealNames = selectedMeals.map(k => mealLabelMap[k] || k).join(', ');

  // Kalorien für nicht geplante Mahlzeiten abziehen
  const MEAL_CAL_DEFAULT = { breakfast: 300, lunch: 400, dinner: 400, snack: 100 };
  const allMealTypes = ['breakfast','lunch','dinner','snack'];
  const unplannedMeals = allMealTypes.filter(m => !selectedMeals.includes(m));
  const unplannedCal = unplannedMeals.reduce((s, m) => s + MEAL_CAL_DEFAULT[m], 0);
  const targetCal = Math.max(300, state.settings.calories - unplannedCal);
  const recipeList = state.recipes.length
    ? state.recipes.map(r => `- ID:${r.id} | ${r.name} (${(MEAL_META[r.category]||MEAL_META.any).label}, ${Math.round(r.calories/(r.servings||1))} kcal) | ${(r.ingredients||[]).slice(0,4).join(', ')}`).join('\n')
    : 'Keine.';

  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 14);
  state.mealHistory = (state.mealHistory || []).filter(entry => new Date(entry.date) > cutoff);
  const historyList = (state.mealHistory || [])
    .flatMap(entry => entry.meals || [])
    .slice(-50)
    .join(', ') || 'keine';

  const fixedMealsList = (state.fixedMeals || []).length
    ? (state.fixedMeals || []).map(fm => {
        const daysLabel = fm.days.includes('all') ? 'täglich'
          : fm.days.map(d => ({mon:'Mo',tue:'Di',wed:'Mi',thu:'Do',fri:'Fr',sat:'Sa',sun:'So'}[d]||d)).join(', ');
        let detail = fm.description;
        if (fm.recipeId) {
          const r = (state.recipes||[]).find(r => r.id === fm.recipeId);
          if (r) detail = r.name;
        }
        return `- ${fm.mealType} (${daysLabel}): ${detail}`;
      }).join('\n')
    : 'Keine.';

  const mainMealLine = {
    morning: 'Das Frühstück soll die kalorienreichste Mahlzeit des Tages sein.',
    midday:  'Das Mittagessen soll die kalorienreichste Mahlzeit des Tages sein.',
    evening: 'Das Abendessen soll die kalorienreichste Mahlzeit des Tages sein.'
  }[state.settings.mainMeal] || 'Das Mittagessen soll die kalorienreichste Mahlzeit des Tages sein.';

  // Einschränkungen aus Hauptperson
  const mainPerson = (state.household?.persons || []).find(p => p.isMain) || {};
  let restrictionLines = '';
  if (mainPerson.restrictionBreakfast) restrictionLines += `- Frühstück: ${mainPerson.restrictionBreakfast}\n`;
  if (mainPerson.restrictionLunch)     restrictionLines += `- Mittagessen: ${mainPerson.restrictionLunch}\n`;
  if (mainPerson.restrictionDinner)    restrictionLines += `- Abendessen: ${mainPerson.restrictionDinner}\n`;
  if (mainPerson.restrictionSnack)     restrictionLines += `- Snack: ${mainPerson.restrictionSnack}\n`;

  // Gemeinsame Mahlzeiten anderer Personen
  const sharedPersonsInfo = Object.entries(state.household?.sharedMeals || {})
    .filter(([, isShared]) => isShared && (state.household?.persons||[]).length > 1)
    .map(([mealType]) => {
      const mealLabel = {breakfast:'Frühstück',lunch:'Mittagessen',dinner:'Abendessen',snack:'Snack'}[mealType];
      const others = (state.household?.persons||[]).filter(p => !p.isMain);
      const infos = others.map(p => {
        const parts = [];
        if (p.avoided?.length) parts.push(`Allergien: ${p.avoided.join(', ')}`);
        if (p.disliked?.length) parts.push(`mag nicht: ${p.disliked.join(', ')}`);
        const r = p[`restriction${mealType.charAt(0).toUpperCase()+mealType.slice(1)}`];
        if (r) parts.push(r);
        return parts.length ? `${p.name}: ${parts.join('; ')}` : null;
      }).filter(Boolean);
      return infos.length ? `${mealLabel} (gemeinsam mit ${others.map(p=>p.name).join(', ')}): ${infos.join(' | ')}` : null;
    }).filter(Boolean).join('\n');

  const nDays = state.numberOfDays || 7;
  const unplannedNote = unplannedCal > 0
    ? `- Hinweis: ${unplannedMeals.map(m => mealLabelMap[m]).join(' & ')} (zusammen ca. ${unplannedCal} kcal) werden außerhalb dieses Plans gegessen. Bitte nur ${targetCal} kcal auf die geplanten Mahlzeiten verteilen.`
    : '';

  const prompt = `Du bist ein professioneller Ernährungsberater. Erstelle einen Essensplan für genau ${nDays} ${nDays===1?'Tag':'Tage'} für eine Person.

VORGABEN:
- Tageskalorienbedarf gesamt: ${state.settings.calories} kcal
- Kalorien für die geplanten Mahlzeiten: ca. ${targetCal} kcal
- Mahlzeiten pro Tag: ${selectedMeals.length} (${mealNames})
${unplannedNote}
- Ernährungsweise: ${state.settings.diet}
- Jahreszeit: ${season} (saisonale Zutaten bevorzugen)
- ${mainMealLine}
- Zu vermeiden (Allergien): ${avoided}
- Unbeliebte Lebensmittel (wenn möglich weglassen): ${disliked}
${restrictionLines ? `- Mahlzeit-Einschränkungen:\n${restrictionLines}` : ''}
${sharedPersonsInfo ? `GEMEINSAME MAHLZEITEN – andere Haushaltsmitglieder essen mit:\n${sharedPersonsInfo}\nBei diesen Mahlzeiten MÜSSEN deren Einschränkungen berücksichtigt werden.\n` : ''}
ZULETZT GEGESSEN (letzte 2 Wochen, bitte Abwechslung sicherstellen):
${historyList}

FESTE MAHLZEITEN (MÜSSEN eingehalten werden):
${fixedMealsList}

VERFÜGBARE REZEPTE AUS DER BIBLIOTHEK (bevorzugt einplanen wenn passend):
${recipeList}

AUSGABE-FORMAT (strikt einhalten, kein anderer Text):
Antworte NUR mit einem gültigen JSON-Objekt in exakt diesem Format (${nDays} Einträge in "days"):
{
  "days": [
    {
      "day": "Tag 1",
      "meals": [
        {
          "type": "Frühstück",
          "name": "Haferflocken mit Beeren",
          "calories": 380,
          "ingredients": ["80g Haferflocken", "150ml Milch", "100g gemischte Beeren", "1 TL Honig"],
          "steps": ["Haferflocken mit Milch aufkochen", "Beeren und Honig hinzufügen"],
          "recipeId": null
        }
      ]
    }
  ]
}

Wichtig:
- Erstelle GENAU ${nDays} Tage (Tag 1 bis Tag ${nDays})
- Nur diese Mahlzeiten pro Tag: ${mealNames}
- Kalorien pro Tag (Tagessumme der geplanten Mahlzeiten): ca. ${targetCal} kcal
- recipeId nur setzen wenn eine passende Bibliotheks-Rezept-ID existiert (exakt wie angegeben)
- steps: mindestens 2-3 konkrete Zubereitungsschritte
- Kalorien so auf die Mahlzeiten verteilen, dass die Tagessumme ca. ${targetCal} kcal ergibt
- Abwechslungsreich, lecker, alltagstauglich`;

  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 90000);
    let resp;
    try {
      resp = await hfFetch({
        _token: token,
        model: state.settings.hfModel,
        messages: [
          { role: 'system', content: 'Du bist ein Ernaehrungsberater. Antworte ausschliesslich mit validem JSON, ohne Erklaerungen oder Markdown.' },
          { role: 'user', content: prompt }
        ],
        max_tokens: 3500,
        temperature: 0.7,
        stream: false
      }, controller.signal);
    } finally {
      clearTimeout(timeoutId);
    }

    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`API-Fehler ${resp.status}: ${errText.slice(0,200)}`);
    }

    const data = await resp.json();
    const content2 = data.choices?.[0]?.message?.content || '';
    const match2 = content2.match(/\{[\s\S]*\}/);
    if (!match2) throw new Error('Kein JSON in der Antwort gefunden.');
    const plan = JSON.parse(match2[0]);
    if (!plan.days || !Array.isArray(plan.days)) throw new Error('Ungültiges Plan-Format.');
    plan.generatedAt = new Date().toISOString();
    normalizePlan(plan);

    // Aktuellen Plan in Verlauf sichern
    if (state.plan && state.plan.days) {
      state.planHistory = [
        { id: Date.now().toString(), savedAt: new Date().toISOString(), plan: state.plan },
        ...(state.planHistory || [])
      ].slice(0, 28);
    }
    // Pläne älter als 4 Wochen löschen
    const cutoff4w = new Date();
    cutoff4w.setDate(cutoff4w.getDate() - 28);
    state.planHistory = (state.planHistory || []).filter(e => new Date(e.savedAt) > cutoff4w);

    state.plan = plan;
    const todayStr = new Date().toISOString().slice(0,10);
    const mealNames2 = plan.days.flatMap(d => (d.meals||[]).map(m => m.name));
    state.mealHistory = [...(state.mealHistory||[]), { date: todayStr, meals: mealNames2 }];
    save();
    renderPlan();
  } catch (e) {
    console.error('generatePlan Fehler:', e);
    const msg = e.name === 'AbortError' ? 'Zeitüberschreitung – bitte erneut versuchen.' : e.message;
    alert('Fehler beim Erstellen des Plans:\n' + msg);
    isGenerating = false;
    renderPlan();
  } finally {
    isGenerating = false;
  }
}

// ── Plan-Verlauf ───────────────────────────────────────────────────────────
function openPlanHistory() {
  renderPlanHistoryList();
  openModal('modal-plan-history');
}

function renderPlanHistoryList() {
  const list = document.getElementById('plan-history-list');
  if (!list) return;
  const history = state.planHistory || [];
  if (!history.length) {
    list.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px">Noch keine früheren Pläne gespeichert.</p>';
    return;
  }
  list.innerHTML = history.map((entry, i) => {
    const d = new Date(entry.savedAt);
    const label = d.toLocaleDateString('de-DE', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
    const time  = d.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
    const days  = entry.plan?.days?.length || 0;
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--divider)">
      <div>
        <div style="font-size:14px;font-weight:500">${label}</div>
        <div style="font-size:12px;color:var(--muted)">${time} Uhr · ${days} Tage</div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0">
        <button onclick="restorePlan(${i})" style="padding:6px 12px;background:var(--gold);border:none;border-radius:14px;color:#000;font-size:13px;font-weight:600;cursor:pointer">Laden</button>
        <button onclick="deletePlanHistory(${i})" style="padding:6px 10px;background:var(--elevated);border:none;border-radius:14px;color:var(--muted);font-size:16px;cursor:pointer">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function restorePlan(index) {
  const entry = (state.planHistory || [])[index];
  if (!entry) return;
  if (state.plan && state.plan.days) {
    state.planHistory = [
      { id: Date.now().toString(), savedAt: new Date().toISOString(), plan: state.plan },
      ...(state.planHistory.filter((_, i) => i !== index))
    ];
  } else {
    state.planHistory = state.planHistory.filter((_, i) => i !== index);
  }
  state.plan = entry.plan;
  save();
  closeModal('modal-plan-history');
  switchTab('plan');
}

function deletePlanHistory(index) {
  state.planHistory = (state.planHistory || []).filter((_, i) => i !== index);
  save();
  renderPlanHistoryList();
  renderPlan();
}

// ── App-Start ──────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  load();
  switchTab('plan');
});
</script>
</body>
